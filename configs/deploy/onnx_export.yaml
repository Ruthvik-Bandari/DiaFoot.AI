# ONNX Export Configuration
export:
  opset_version: 18
  dynamic_axes:
    input: {0: batch_size}
    output: {0: batch_size}
  input_shape: [1, 3, 512, 512]
  validation_atol: 1.0e-5
  models:
    - name: classifier
      source: checkpoints/best_classifier.pt
      output: exports/classifier.onnx
    - name: segmenter
      source: checkpoints/best_segmenter.pt
      output: exports/segmenter.onnx
    - name: stager
      source: checkpoints/best_stager.pt
      output: exports/stager.onnx
