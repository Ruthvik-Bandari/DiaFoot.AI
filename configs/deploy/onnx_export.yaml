# ONNX Export Configuration (DINOv2)
export:
  opset_version: 17
  dynamic_axes:
    input: {0: batch_size}
    output: {0: batch_size}
  input_shape: [1, 3, 518, 518]   # DINOv2 native resolution
  validation_atol: 1.0e-5
  models:
    - name: classifier
      source: checkpoints/dinov2_classifier/best.pt
      output: exports/classifier.onnx
      model_type: dinov2-classifier
    - name: segmenter
      source: checkpoints/dinov2_segmenter/best.pt
      output: exports/segmenter.onnx
      model_type: dinov2
